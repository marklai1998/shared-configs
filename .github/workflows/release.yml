name: Publish Package to registry
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
        name: Install pnpm

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build
        run: pnpm build

      - run: pnpm publish --filter "@marklai/shared-config-biome" --access public --no-git-checks
        if: ${{ steps.release.outputs['packages/biome--release_created'] }}

      - run: pnpm publish --filter "@marklai/shared-config-typescript" --access public --no-git-checks
        if: ${{ steps.release.outputs['packages/typescript--release_created'] }}

      - run: pnpm publish --filter "@marklai/shared-config-commitlint" --access public --no-git-checks
        if: ${{ steps.release.outputs['packages/commitlint--release_created'] }}
