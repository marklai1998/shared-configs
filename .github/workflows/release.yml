name: Publish Package to registry
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        name: Install pnpm

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build
        run: pnpm build

      - run: pnpm publish --filter "@marklai/shared-config-biome" --access public --no-git-checks
        if: ${{ steps.release.outputs['packages/biome--release_created'] }}

      - run: pnpm publish --filter "@marklai/shared-config-typescript" --access public --no-git-checks
        if: ${{ steps.release.outputs['packages/typescript--release_created'] }}

      - run: pnpm publish --filter "@marklai/shared-config-commitlint" --access public --no-git-checks
        if: ${{ steps.release.outputs['packages/commitlint--release_created'] }}
